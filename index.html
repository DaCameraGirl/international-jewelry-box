<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 International Jewelry Box</title>
    
    <!-- PWA STUFF -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a0033">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Jewelry Box">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a0033, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            font-family: 'Press Start 2P', cursive;
            color: #fff;
            position: relative;
            gap: 20px;
            padding: 20px;
        }

        .app-title {
            font-size: 1.2rem;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
            animation: colorCycle 5s infinite linear;
            z-index: 10;
        }

        .controls {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 50px;
            border: 4px solid #ff00ff;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 3;
            box-shadow: 0 0 30px #ff00ff;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls select {
            font-family: 'Press Start 2P', cursive;
            padding: 8px 12px;
            font-size: 0.7rem;
            background: #000;
            color: #fff;
            border: 3px solid #00ffff;
            border-radius: 10px;
            max-width: 140px;
        }

        .swap-btn {
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            border: none;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2rem;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 0 20px #ff00ff;
        }

        .swap-btn:hover {
            transform: rotate(180deg) scale(1.1);
            box-shadow: 0 0 30px #00ffff;
        }

        .response-box {
            background: rgba(0, 0, 0, 0.75);
            border: 8px solid #ff00ff;
            border-radius: 25px;
            padding: 30px;
            width: 100%;
            max-width: 820px;
            text-align: center;
            box-shadow: 0 0 40px #ff00ff, 0 0 80px #00ffff, 0 0 120px #ffff00;
            animation: borderGlow 1.8s infinite alternate ease-in-out;
            position: relative;
            z-index: 2;
        }

        @keyframes borderGlow {
            from { border-color: #ff00ff; box-shadow: 0 0 40px #ff00ff, 0 0 80px #00ffff; }
            to   { border-color: #00ffff; box-shadow: 0 0 40px #00ffff, 0 0 80px #ffff00; }
        }

        .text-container {
            position: relative;
            display: inline-block;
            width: 100%;
            min-height: 180px;
        }

        .gem-text {
            font-size: 1.5rem;
            line-height: 1.5;
            animation: twinkleText 1.2s infinite alternate ease-in-out, colorCycle 5s infinite linear;
            text-shadow: 0 0 20px currentColor, 0 0 40px currentColor, 0 0 70px #ff00ff;
            outline: none;
            min-height: 180px;
            cursor: text;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            user-select: text;
            -webkit-user-select: text;
            word-wrap: break-word;
        }

        @keyframes twinkleText {
            0%   { opacity: 0.85; transform: scale(0.98); }
            100% { opacity: 1;    transform: scale(1.02); }
        }

        @keyframes colorCycle {
            0%    { color: #ff00ff; }
            20%   { color: #00ffff; }
            40%   { color: #ffff00; }
            60%   { color: #00ff00; }
            80%   { color: #ff8800; }
            100%  { color: #ff00ff; }
        }

        #sourceText { 
            position: relative; 
            z-index: 1; 
        }

        #targetText {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            filter: blur(20px);
            z-index: 2;
            pointer-events: none;
            box-sizing: border-box;
        }

        .gem {
            position: fixed;
            font-size: 2rem;
            animation: floatGem 7s linear infinite;
            z-index: 1;
            opacity: 0.95;
            text-shadow: 0 0 25px #ffffff;
        }

        @keyframes floatGem {
            0%   { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-110vh) rotate(900deg); }
        }

        .info {
            font-size: 0.7rem;
            max-width: 700px;
            text-align: center;
            opacity: 0.8;
            z-index: 10;
        }

        .status {
            font-size: 0.7rem;
            color: #00ffff;
            margin-top: 10px;
        }

        .install-btn {
            display: none;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            border: none;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 20px #ff00ff;
            z-index: 10;
            margin-top: 10px;
        }

        .install-btn:hover {
            box-shadow: 0 0 30px #00ffff;
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .gem-text { font-size: 1.2rem; }
            .app-title { font-size: 0.9rem; }
            .controls { padding: 10px 15px; }
            .controls select { font-size: 0.6rem; padding: 6px 8px; }
            .response-box { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="gem" style="left:8%; animation-delay:0s;">💎</div>
    <div class="gem" style="left:18%; animation-delay:0.8s;">✨</div>
    <div class="gem" style="left:28%; animation-delay:2.1s;">💎</div>
    <div class="gem" style="left:39%; animation-delay:1.4s;">🪩</div>
    <div class="gem" style="left:52%; animation-delay:3.3s;">✨</div>
    <div class="gem" style="left:61%; animation-delay:0.5s;">💎</div>
    <div class="gem" style="left:72%; animation-delay:2.7s;">🪩</div>
    <div class="gem" style="left:83%; animation-delay:1.9s;">✨</div>
    <div class="gem" style="left:91%; animation-delay:4.1s;">💎</div>

    <div class="app-title">💎 International Jewelry Box 💎</div>

    <div class="controls">
        <select id="sourceLang">
            <option value="en">English 🇺🇸</option>
            <option value="es">Spanish 🇪🇸</option>
            <option value="fr">French 🇫🇷</option>
            <option value="de">German 🇩🇪</option>
            <option value="it">Italian 🇮🇹</option>
            <option value="pt">Portuguese 🇵🇹</option>
            <option value="ru">Russian 🇷🇺</option>
            <option value="ja">Japanese 🇯🇵</option>
            <option value="ko">Korean 🇰🇷</option>
            <option value="zh">Chinese 🇨🇳</option>
            <option value="ar">Arabic 🇸🇦</option>
            <option value="el">Greek 🇬🇷</option>
            <option value="hi">Hindi 🇮🇳</option>
            <option value="tr">Turkish 🇹🇷</option>
            <option value="vi">Vietnamese 🇻🇳</option>
            <option value="th">Thai 🇹🇭</option>
            <option value="pl">Polish 🇵🇱</option>
            <option value="nl">Dutch 🇳🇱</option>
            <option value="sv">Swedish 🇸🇪</option>
            <option value="he">Hebrew 🇮🇱</option>
            <option value="id">Indonesian 🇮🇩</option>
            <option value="uk">Ukrainian 🇺🇦</option>
            <option value="cs">Czech 🇨🇿</option>
            <option value="ro">Romanian 🇷🇴</option>
            <option value="hu">Hungarian 🇭🇺</option>
            <option value="fil">Filipino 🇵🇭</option>
        </select>

        <button class="swap-btn" id="swapBtn" title="Swap languages">⇄</button>

        <select id="targetLang">
            <option value="es">Spanish 🇪🇸</option>
            <option value="en">English 🇺🇸</option>
            <option value="fr">French 🇫🇷</option>
            <option value="de">German 🇩🇪</option>
            <option value="it">Italian 🇮🇹</option>
            <option value="pt">Portuguese 🇵🇹</option>
            <option value="ru">Russian 🇷🇺</option>
            <option value="ja">Japanese 🇯🇵</option>
            <option value="ko">Korean 🇰🇷</option>
            <option value="zh">Chinese 🇨🇳</option>
            <option value="ar">Arabic 🇸🇦</option>
            <option value="el">Greek 🇬🇷</option>
            <option value="hi">Hindi 🇮🇳</option>
            <option value="tr">Turkish 🇹🇷</option>
            <option value="vi">Vietnamese 🇻🇳</option>
            <option value="th">Thai 🇹🇭</option>
            <option value="pl">Polish 🇵🇱</option>
            <option value="nl">Dutch 🇳🇱</option>
            <option value="sv">Swedish 🇸🇪</option>
            <option value="he">Hebrew 🇮🇱</option>
            <option value="id">Indonesian 🇮🇩</option>
            <option value="uk">Ukrainian 🇺🇦</option>
            <option value="cs">Czech 🇨🇿</option>
            <option value="ro">Romanian 🇷🇴</option>
            <option value="hu">Hungarian 🇭🇺</option>
            <option value="fil">Filipino 🇵🇭</option>
        </select>
    </div>

    <div class="response-box">
        <div class="text-container">
            <div id="sourceText" class="gem-text" contenteditable="true"></div>
            <div id="targetText" class="gem-text"></div>
        </div>
        <div id="status" class="status"></div>
    </div>

    <button class="install-btn" id="installBtn">📱 Install App</button>

    <div class="info">
        type anything → wait 4 seconds → ✨ magic ✨<br>
        tap ⇄ to swap 💎
    </div>

    <script>
        var source = document.getElementById('sourceText');
        var target = document.getElementById('targetText');
        var sourceLang = document.getElementById('sourceLang');
        var targetLang = document.getElementById('targetLang');
        var swapBtn = document.getElementById('swapBtn');
        var status = document.getElementById('status');
        var installBtn = document.getElementById('installBtn');

        var timeout = null;
        var isAnimating = false;
        var WAIT_TIME = 4000;
        var FADE_DURATION = 6500;
        var deferredPrompt = null;

        var lingvaServers = [
            'https://lingva.lunar.icu',
            'https://translate.plausibility.cloud',
            'https://lingva.garuder.xyz'
        ];

        // PWA Install prompt
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async function() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            var result = await deferredPrompt.userChoice;
            if (result.outcome === 'accepted') {
                status.textContent = '💎 App installed!';
            }
            deferredPrompt = null;
            installBtn.style.display = 'none';
        });

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(function() { console.log('SW registered'); })
                .catch(function(err) { console.log('SW failed', err); });
        }

        swapBtn.addEventListener('click', function() {
            var tempVal = sourceLang.value;
            sourceLang.value = targetLang.value;
            targetLang.value = tempVal;
            status.textContent = '🔄 Languages swapped!';
        });

        async function tryLingva(text, fromLang, toLang, serverUrl) {
            var url = serverUrl + '/api/v1/' + fromLang + '/' + toLang + '/' + encodeURIComponent(text);
            var res = await fetch(url);
            if (!res.ok) throw new Error('Server error');
            var data = await res.json();
            if (data.translation) return data.translation;
            throw new Error('No translation');
        }

        async function tryLibreTranslate(text, fromLang, toLang) {
            var res = await fetch('https://libretranslate.de/translate', {
                method: 'POST',
                body: JSON.stringify({ 
                    q: text, 
                    source: fromLang, 
                    target: toLang, 
                    format: 'text' 
                }),
                headers: { 'Content-Type': 'application/json' }
            });
            if (!res.ok) throw new Error('Server error');
            var data = await res.json();
            if (data.translatedText) return data.translatedText;
            throw new Error('No translation');
        }

        async function translateText(text, fromLang, toLang) {
            if (!text.trim()) return text;

            if (fromLang === toLang) {
                status.textContent = '🤔 Same language selected!';
                return text;
            }

            status.textContent = '✨ Translating...';

            for (var i = 0; i < lingvaServers.length; i++) {
                try {
                    var result = await tryLingva(text, fromLang, toLang, lingvaServers[i]);
                    status.textContent = '💎 Translated!';
                    return result;
                } catch (e) {
                    console.log('Server ' + (i+1) + ' failed, trying next...');
                }
            }

            try {
                var result = await tryLibreTranslate(text, fromLang, toLang);
                status.textContent = '💎 Translated!';
                return result;
            } catch (e) {
                console.log('LibreTranslate failed too');
            }

            status.textContent = '⚠️ Translation unavailable';
            return text;
        }

        function triggerFade(translatedText) {
            target.textContent = translatedText;
            isAnimating = true;

            source.style.transition = 'opacity ' + FADE_DURATION + 'ms ease, filter ' + FADE_DURATION + 'ms ease, transform ' + FADE_DURATION + 'ms ease';
            source.style.opacity = '0';
            source.style.filter = 'blur(22px)';
            source.style.transform = 'scale(0.87)';

            target.style.transition = 'opacity ' + FADE_DURATION + 'ms ease, filter ' + FADE_DURATION + 'ms ease, transform ' + FADE_DURATION + 'ms ease';
            target.style.opacity = '1';
            target.style.filter = 'blur(0px)';
            target.style.transform = 'scale(1)';

            setTimeout(resetBox, FADE_DURATION + 2500);
        }

        function resetBox() {
            source.style.transition = 'none';
            source.style.opacity = '1';
            source.style.filter = 'blur(0px)';
            source.style.transform = 'scale(1)';
            source.textContent = '';

            target.style.transition = 'none';
            target.style.opacity = '0';
            target.style.filter = 'blur(20px)';
            target.style.transform = 'scale(1)';
            target.textContent = '';

            status.textContent = '✨ Ready - type something!';
            isAnimating = false;
            source.focus();
        }

        source.addEventListener('input', function() {
            if (isAnimating) return;

            clearTimeout(timeout);

            var text = source.textContent || source.innerText;
            
            if (!text.trim()) {
                status.textContent = '';
                return;
            }

            status.textContent = '⏳ Waiting...';

            timeout = setTimeout(async function() {
                var from = sourceLang.value;
                var to = targetLang.value;
                var translated = await translateText(text, from, to);
                triggerFade(translated);
            }, WAIT_TIME);
        });

        window.addEventListener('load', function() {
            status.textContent = '✨ Tap here and type!';
            source.focus();
        });

        source.addEventListener('focus', function() {
            if (!isAnimating && !source.textContent.trim()) {
                status.textContent = '✨ Type something...';
            }
        });
    </script>

</body>
</html>
