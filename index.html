<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 International Jewelry Box</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a0033">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Jewelry Box">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+KR:wght@400;700&family=Noto+Sans+SC:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&family=Noto+Sans+Hebrew:wght@400;700&family=Noto+Sans+Thai:wght@400;700&family=Noto+Sans+Devanagari:wght@400;700&family=Noto+Sans:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a0033, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            color: #fff;
            position: relative;
            gap: 20px;
            padding: 20px;
        }

        .app-title {
            font-size: 1.2rem;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
            animation: colorCycle 5s infinite linear;
            z-index: 10;
            font-family: 'Press Start 2P', cursive;
        }

        .controls {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 50px;
            border: 4px solid #ff00ff;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 3;
            box-shadow: 0 0 30px #ff00ff;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls select {
            font-family: 'Press Start 2P', cursive;
            padding: 8px 12px;
            font-size: 0.7rem;
            background: #000;
            color: #fff;
            border: 3px solid #00ffff;
            border-radius: 10px;
            max-width: 140px;
        }

        .swap-btn {
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            border: none;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2rem;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 0 20px #ff00ff;
        }

        .swap-btn:hover {
            transform: rotate(180deg) scale(1.1);
            box-shadow: 0 0 30px #00ffff;
        }

        .response-box {
            background: rgba(0, 0, 0, 0.75);
            border: 8px solid #ff00ff;
            border-radius: 25px;
            padding: 30px;
            width: 100%;
            max-width: 820px;
            text-align: center;
            box-shadow: 0 0 40px #ff00ff, 0 0 80px #00ffff, 0 0 120px #ffff00;
            animation: borderGlow 1.8s infinite alternate ease-in-out;
            position: relative;
            z-index: 2;
        }

        @keyframes borderGlow {
            from { border-color: #ff00ff; box-shadow: 0 0 40px #ff00ff, 0 0 80px #00ffff; }
            to   { border-color: #00ffff; box-shadow: 0 0 40px #00ffff, 0 0 80px #ffff00; }
        }

        .text-container {
            position: relative;
            display: inline-block;
            width: 100%;
            min-height: 180px;
        }

        .gem-text {
            font-size: 1.5rem;
            line-height: 1.5;
            animation: twinkleText 1.2s infinite alternate ease-in-out, colorCycle 5s infinite linear;
            text-shadow: 0 0 20px currentColor, 0 0 40px currentColor, 0 0 70px #ff00ff;
            outline: none;
            min-height: 180px;
            cursor: text;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            user-select: text;
            -webkit-user-select: text;
            word-wrap: break-word;
        }

        @keyframes twinkleText {
            0%   { opacity: 0.85; transform: scale(0.98); }
            100% { opacity: 1;    transform: scale(1.02); }
        }

        @keyframes colorCycle {
            0%    { color: #ff00ff; }
            20%   { color: #00ffff; }
            40%   { color: #ffff00; }
            60%   { color: #00ff00; }
            80%   { color: #ff8800; }
            100%  { color: #ff00ff; }
        }

        #sourceText { 
            position: relative; 
            z-index: 1; 
        }

        #targetText {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            filter: blur(20px);
            z-index: 2;
            pointer-events: none;
            box-sizing: border-box;
        }

        /* Language-specific fonts */
        .font-default {
            font-family: 'Press Start 2P', 'Noto Sans', sans-serif;
        }
        
        .font-arabic {
            font-family: 'Noto Sans Arabic', sans-serif;
            font-size: 1.3rem !important;
        }
        
        .font-hebrew {
            font-family: 'Noto Sans Hebrew', sans-serif;
            font-size: 1.3rem !important;
        }
        
        .font-japanese {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 1.3rem !important;
        }
        
        .font-korean {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.3rem !important;
        }
        
        .font-chinese {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1.3rem !important;
        }
        
        .font-thai {
            font-family: 'Noto Sans Thai', sans-serif;
            font-size: 1.3rem !important;
        }
        
        .font-hindi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 1.3rem !important;
        }
        
        .font-russian {
            font-family: 'Press Start 2P', 'Noto Sans', sans-serif;
        }
        
        .font-greek {
            font-family: 'Press Start 2P', 'Noto Sans', sans-serif;
        }

        .gem {
            position: fixed;
            font-size: 2rem;
            animation: floatGem 7s linear infinite;
            z-index: 1;
            opacity: 0.95;
            text-shadow: 0 0 25px #ffffff;
        }

        @keyframes floatGem {
            0%   { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-110vh) rotate(900deg); }
        }

        .info {
            font-size: 0.7rem;
            max-width: 700px;
            text-align: center;
            opacity: 0.8;
            z-index: 10;
            font-family: 'Press Start 2P', cursive;
        }

        .status {
            font-size: 0.7rem;
            color: #00ffff;
            margin-top: 10px;
            font-family: 'Press Start 2P', cursive;
        }

        .button-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
        }

        .install-btn {
            display: none;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            border: none;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 20px #ff00ff;
        }

        .install-btn:hover {
            box-shadow: 0 0 30px #00ffff;
            transform: scale(1.05);
        }

        .qr-btn {
            display: block;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            border: none;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 20px #00ffff;
        }

        .qr-btn:hover {
            box-shadow: 0 0 30px #ff00ff;
            transform: scale(1.05);
        }

        .qr-popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .qr-popup.active {
            display: flex;
        }

        .qr-content {
            background: linear-gradient(145deg, #1a0033, #000);
            border: 4px solid #ff00ff;
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 40px #ff00ff, 0 0 80px #00ffff;
            animation: borderGlow 1.8s infinite alternate ease-in-out;
            position: relative;
        }

        .qr-content h2 {
            font-size: 1rem;
            margin-bottom: 20px;
            color: #00ffff;
            font-family: 'Press Start 2P', cursive;
        }

        .qr-content img {
            border-radius: 15px;
            border: 4px solid #00ffff;
            box-shadow: 0 0 20px #00ffff;
        }

        .qr-content p {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #ff00ff;
            font-family: 'Press Start 2P', cursive;
        }

        .qr-close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            color: #ff00ff;
            cursor: pointer;
        }

        .qr-close:hover {
            color: #00ffff;
        }

        /* Right-to-left languages */
        .rtl {
            direction: rtl;
            text-align: right;
        }

        .ltr {
            direction: ltr;
            text-align: left;
        }

        .test-btn {
            background: linear-gradient(45deg, #ffff00, #ff8800);
            border: none;
            color: #000;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 15px #ffff00;
        }

        .test-btn:hover {
            box-shadow: 0 0 25px #ff8800;
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .gem-text { font-size: 1.2rem; }
            .app-title { font-size: 0.9rem; }
            .controls { padding: 10px 15px; }
            .controls select { font-size: 0.6rem; padding: 6px 8px; }
            .response-box { padding: 20px; }
            .font-arabic, .font-hebrew, .font-japanese, .font-korean, .font-chinese, .font-thai, .font-hindi {
                font-size: 1.1rem !important;
            }
        }
    </style>
</head>

    <div class="response-box">

    <div class="button-row">

        type anything → wait 4 seconds → ✨ magic ✨<br>

    <div class="qr-popup" id="qrPopup">
        <div class="qr-content">
            <span class="qr-close" id="qrClose">✕</span>
            <h2>📲 Scan to Open</h2>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://dacameragirl.github.io/international-jewelry-box/" alt="QR Code">

    <script>
        var source = document.getElementById('sourceText');
        var target = document.getElementById('targetText');
        var sourceLang = document.getElementById('sourceLang');
        var targetLang = document.getElementById('targetLang');
        var swapBtn = document.getElementById('swapBtn');
        var testBtn = document.getElementById('testBtn');
        var status = document.getElementById('status');
        var installBtn = document.getElementById('installBtn');
        var qrBtn = document.getElementById('qrBtn');
        var qrPopup = document.getElementById('qrPopup');
        var qrClose = document.getElementById('qrClose');

        var timeout = null;
        var isAnimating = false;
        var WAIT_TIME = 4000;
        var FADE_DURATION = 6500;
        var deferredPrompt = null;

        // Language font mapping
        const fontMapping = {
            'en': 'font-default',
            'es': 'font-default',
            'fr': 'font-default',
            'de': 'font-default',
            'it': 'font-default',
            'pt': 'font-default',
            'ru': 'font-russian',
            'ja': 'font-japanese',
            'ko': 'font-korean',
            'zh': 'font-chinese',
            'ar': 'font-arabic',
            'el': 'font-greek',
            'hi': 'font-hindi',
            'tr': 'font-default',
            'vi': 'font-default',
            'th': 'font-thai',
            'pl': 'font-default',
            'nl': 'font-default',
            'sv': 'font-default',
            'he': 'font-hebrew',
            'id': 'font-default',
            'uk': 'font-russian',
            'cs': 'font-default',
            'ro': 'font-default',
            'hu': 'font-default',
            'tl': 'font-default',
            'auto': 'font-default'
        };

        // RTL languages
        const rtlLanguages = ['ar', 'he', 'fa', 'ur'];

        // QR Code popup
        qrBtn.addEventListener('click', function() {
            qrPopup.classList.add('active');
        });

        qrClose.addEventListener('click', function() {
            qrPopup.classList.remove('active');
        });

        qrPopup.addEventListener('click', function(e) {
            if (e.target === qrPopup) {
                qrPopup.classList.remove('active');
            }
        });

        // PWA Install prompt
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async function() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            var result = await deferredPrompt.userChoice;
            if (result.outcome === 'accepted') {
                status.textContent = '💎 App installed!';
            }
            deferredPrompt = null;
            installBtn.style.display = 'none';
        });

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(function() { console.log('SW registered'); })
                .catch(function(err) { console.log('SW failed', err); });
        }

        // Function to update font and direction
        function updateInputLanguage(langCode) {
            const sourceElement = document.getElementById('sourceText');
            const targetElement = document.getElementById('targetText');
            
            // Remove all font and direction classes
            sourceElement.className = 'gem-text';
            targetElement.className = 'gem-text';
            
            // Add font class
            const fontClass = fontMapping[langCode] || 'font-default';
            sourceElement.classList.add(fontClass);
            targetElement.classList.add(fontClass);
            
            // Add direction class
            if (rtlLanguages.includes(langCode)) {
                sourceElement.classList.add('rtl');
                targetElement.classList.add('rtl');
            } else {
                sourceElement.classList.add('ltr');
                targetElement.classList.add('ltr');
            }
            
            // Set lang attribute for keyboard hints
            sourceElement.setAttribute('lang', langCode);
            targetElement.setAttribute('lang', targetLang.value);
        }

        swapBtn.addEventListener('click', function() {
            var sourceVal = sourceLang.value;
            var targetVal = targetLang.value;
            
            if (sourceVal === 'auto') {
                status.textContent = '🤔 Can\'t swap auto-detect!';
                return;
            }
            
            sourceLang.value = targetVal;
            targetLang.value = sourceVal;
            
            // Update font and direction
            updateInputLanguage(sourceLang.value);
            
            status.textContent = '🔄 Languages swapped!';
        });

        // Test language input button
        testBtn.addEventListener('click', function() {
            const testPhrases = {
                'es': 'Hola, ¿cómo estás?',
                'fr': 'Bonjour, comment ça va?',
                'de': 'Hallo, wie geht es dir?',
                'ja': 'こんにちは、元気ですか？',
                'ar': 'مرحبا، كيف حالك؟',
                'ru': 'Привет, как дела?',
                'zh': '你好，你怎么样？',
                'ko': '안녕하세요, 어떻게 지내세요?',
                'hi': 'नमस्ते, आप कैसे हैं?',
                'he': 'שלום, מה שלומך?',
                'th': 'สวัสดี เป็นอย่างไรบ้าง?',
                'it': 'Ciao, come stai?',
                'pt': 'Olá, como você está?',
                'nl': 'Hallo, hoe gaat het?',
                'sv': 'Hej, hur mår du?',
                'pl': 'Cześć, jak się masz?',
                'tr': 'Merhaba, nasılsın?',
                'vi': 'Xin chào, bạn khỏe không?'
            };
            
            const lang = sourceLang.value;
            if (testPhrases[lang]) {
                source.textContent = testPhrases[lang];
                status.textContent = `✅ Test phrase for ${lang} inserted`;
                
                // Trigger translation after 1 second
                setTimeout(async function() {
                    const from = sourceLang.value;
                    const to = targetLang.value;
                    const translated = await translateText(source.textContent, from, to);
                    triggerFade(translated);
                }, 1000);
            } else {
                status.textContent = '⚠️ No test phrase for this language';
            }
        });

        // Update font when source language changes
        sourceLang.addEventListener('change', function() {
            if (sourceLang.value !== 'auto') {
                updateInputLanguage(sourceLang.value);
            }
        });

        // Main translation function using Google Translate
        async function translateText(text, fromLang, toLang) {
            if (!text.trim()) return text;

            // Check if same language selected (not auto)
            if (fromLang !== 'auto' && fromLang === toLang) {
                status.textContent = '🤔 Same language selected!';
                return text;
            }

            status.textContent = '✨ Translating...';

            // Use 'auto' for auto-detect, otherwise use selected language
            var sl = (fromLang === 'auto') ? 'auto' : fromLang;
            var tl = toLang;

            // Try Google Translate API
            try {
                var url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=' + sl + '&tl=' + tl + '&dt=t&q=' + encodeURIComponent(text);
                
                var res = await fetch(url);
                
                if (res.ok) {
                    var data = await res.json();
                    
                    if (data && data[0]) {
                        var translated = '';
                        for (var i = 0; i < data[0].length; i++) {
                            if (data[0][i] && data[0][i][0]) {
                                translated += data[0][i][0];
                            }
                        }
                        
                        if (translated && translated.trim() !== '') {
                            status.textContent = '💎 Translated!';
                            return translated;
                        }
                    }
                }
            } catch (e) {
                console.log('Google Translate error:', e);
            }

            // Backup: MyMemory API
            try {
                var mmFrom = (fromLang === 'auto') ? 'autodetect' : fromLang;
                var mmUrl = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=' + mmFrom + '|' + toLang;
                
                var mmRes = await fetch(mmUrl);
                
                if (mmRes.ok) {
                    var mmData = await mmRes.json();
                    
                    if (mmData.responseStatus === 200 && mmData.responseData && mmData.responseData.translatedText) {
                        var mmTranslated = mmData.responseData.translatedText;
                        
                        // Filter out error messages
                        if (!mmTranslated.includes('PLEASE SELECT') && !mmTranslated.includes('INVALID')) {
                            if (mmTranslated.includes('MYMEMORY WARNING')) {
                                mmTranslated = mmTranslated.split('MYMEMORY WARNING')[0].trim();
                            }
                            status.textContent = '💎 Translated!';
                            return mmTranslated;
                        }
                    }
                }
            } catch (e) {
                console.log('MyMemory error:', e);
            }

            // Backup: Lingva API
            try {
                var lingvaFrom = (fromLang === 'auto') ? 'auto' : fromLang;
                var lingvaUrl = 'https://lingva.lunar.icu/api/v1/' + lingvaFrom + '/' + toLang + '/' + encodeURIComponent(text);
                
                var lingvaRes = await fetch(lingvaUrl);
                
                if (lingvaRes.ok) {
                    var lingvaData = await lingvaRes.json();
                    
                    if (lingvaData && lingvaData.translation) {
                        status.textContent = '💎 Translated!';
                        return lingvaData.translation;
                    }
                }
            } catch (e) {
                console.log('Lingva error:', e);
            }

            status.textContent = '⚠️ Translation unavailable';
            return text;
        }

        function triggerFade(translatedText) {
            // Update target font to match target language
            const targetFontClass = fontMapping[targetLang.value] || 'font-default';
            const targetDirection = rtlLanguages.includes(targetLang.value) ? 'rtl' : 'ltr';
            target.className = 'gem-text ' + targetFontClass + ' ' + targetDirection;
            
            target.textContent = translatedText;
            isAnimating = true;

            source.style.transition = 'opacity ' + FADE_DURATION + 'ms ease, filter ' + FADE_DURATION + 'ms ease, transform ' + FADE_DURATION + 'ms ease';
            source.style.opacity = '0';
            source.style.filter = 'blur(22px)';
            source.style.transform = 'scale(0.87)';

            target.style.transition = 'opacity ' + FADE_DURATION + 'ms ease, filter ' + FADE_DURATION + 'ms ease, transform ' + FADE_DURATION + 'ms ease';
            target.style.opacity = '1';
            target.style.filter = 'blur(0px)';
            target.style.transform = 'scale(1)';

            setTimeout(resetBox, FADE_DURATION + 2500);
        }

        function resetBox() {
            source.style.transition = 'none';
            source.style.opacity = '1';
            source.style.filter = 'blur(0px)';
            source.style.transform = 'scale(1)';
            source.textContent = '';

            target.style.transition = 'none';
            target.style.opacity = '0';
            target.style.filter = 'blur(20px)';
            target.style.transform = 'scale(1)';
            target.textContent = '';

            // Reset source font to current source language
            if (sourceLang.value !== 'auto') {
                updateInputLanguage(sourceLang.value);
            }

            status.textContent = '✨ Ready - type something!';
            isAnimating = false;
            source.focus();
        }

        source.addEventListener('input', function() {
            if (isAnimating) return;

            clearTimeout(timeout);

            var text = source.textContent || source.innerText;
            
            if (!text.trim()) {
                status.textContent = '';
                return;
            }

            status.textContent = '⏳ Waiting...';

            timeout = setTimeout(async function() {
                var from = sourceLang.value;
                var to = targetLang.value;
                var translated = await translateText(text, from, to);
                triggerFade(translated);
            }, WAIT_TIME);
        });

        window.addEventListener('load', function() {
            status.textContent = '✨ Tap here and type!';
            source.focus();
        });

        source.addEventListener('focus', function() {
            if (!isAnimating && !source.textContent.trim()) {
                status.textContent = '✨ Type something...';
            }
        });
    </script>

</body>
</html>
